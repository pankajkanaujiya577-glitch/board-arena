name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm install

      - name: Add Android platform
        run: npx cap add android

      - name: Copy web assets
        run: npx cap copy android

      - name: Patch AndroidManifest for AdMob + network security
        run: |
          sed -i 's|</application>|<meta-data android:name="com.google.android.gms.ads.APPLICATION_ID" android:value="ca-app-pub-3986271358251076~4345351648"/>\n    </application>|' android/app/src/main/AndroidManifest.xml
          sed -i 's|<application|<application android:networkSecurityConfig="@xml/network_security_config" android:usesCleartextTraffic="true"|' android/app/src/main/AndroidManifest.xml

      - name: Create network security config
        run: |
          mkdir -p android/app/src/main/res/xml
          cat > android/app/src/main/res/xml/network_security_config.xml << 'XMLEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <network-security-config>
            <base-config cleartextTrafficPermitted="true">
              <trust-anchors>
                <certificates src="system"/>
              </trust-anchors>
            </base-config>
            <domain-config cleartextTrafficPermitted="false">
              <domain includeSubdomains="true">googleapis.com</domain>
              <domain includeSubdomains="true">firebaseapp.com</domain>
              <domain includeSubdomains="true">firebasestorage.app</domain>
              <trust-anchors>
                <certificates src="system"/>
              </trust-anchors>
            </domain-config>
          </network-security-config>
          XMLEOF

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BoardArena-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
